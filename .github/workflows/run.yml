name: Fetch Events Daily
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
jobs:
  fetch-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and save events
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: |
          node -e "const https=require('https'),fs=require('fs'),T=process.env.EVENTBRITE_TOKEN,A=[{l:'NW6',la:51.5465,ln:-0.1908,p:'NW6'},{l:'NW10',la:51.5354,ln:-0.2312,p:'NW10'},{l:'NW2',la:51.5563,ln:-0.2148,p:'NW2'}];function get(u){return new Promise((r,j)=>{https.get(u,res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>r(JSON.parse(d)));}).on('error',j);})}async function main(){const all=[];for(const a of A){const u='https://www.eventbriteapi.com/v3/events/search/?location.latitude='+a.la+'&location.longitude='+a.ln+'&location.within=3km&expand=venue&token='+T+'&page_size=50';console.log('Fetching '+a.l);const data=await get(u);const events=(data.events||[]).map(ev=>({id:ev.id,title:ev.name&&ev.name.text||'',cat:'community',postcode:a.p,venue:ev.venue&&ev.venue.name||'Venue TBC',date:ev.start&&ev.start.local||'',dateKey:'month',url:ev.url,isFree:ev.is_free,emoji:'📅',bg:'#DBEAFE',lat:parseFloat(ev.venue&&ev.venue.latitude)||null,lng:parseFloat(ev.venue&&ev.venue.longitude)||null}));console.log(events.length+' in '+a.l);all.push(...events)}const seen=new Set();const u=all.filter(e=>seen.has(e.id)?false:seen.add(e.id));fs.writeFileSync('events.json',JSON.stringify({lastUpdated:new Date().toISOString(),totalEvents:u.length,events:u},null,2));console.log('Done! '+u.length+' events.')}main().catch(e=>{console.error(e);process.exit(1)});"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update events"
          file_pattern: events.json
          push_options: '--force'
